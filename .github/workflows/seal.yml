name: seal
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Walk the seal pipeline without mutating anything."
        type: boolean
        default: false
      bump:
        description: "Force a bump direction (patch/minor/major/none). Blank uses the configured strategy."
        type: string
        required: false
        default: ""
permissions:
  contents: write
concurrency:
  group: seal-${{ github.ref }}
  cancel-in-progress: false
jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Seal
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          args=()
          if [[ "$DRY_RUN" == "true" ]]; then args+=(--dry-run); fi
          if [[ -n "$BUMP" ]]; then args+=(--bump "$BUMP"); fi
          nix develop --command hanko seal "${args[@]}"
